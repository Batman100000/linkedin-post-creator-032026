<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asaf's Video Library</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #e5e5e5;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 40px;
  background: linear-gradient(to bottom, #000 0%, transparent 100%);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.header-title { font-size: 28px; font-weight: 900; color: #e50914; letter-spacing: -0.5px; }
.header-sub { font-size: 11px; color: #555; margin-top: 2px; }
.header-right { display: flex; gap: 10px; align-items: center; }

.stats-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; padding: 6px 12px; border-radius: 20px;
  background: rgba(76,175,80,0.15); color: #4caf50;
  border: 1px solid rgba(76,175,80,0.3);
  font-weight: 600;
}
.stats-pill.warning { background: rgba(255,107,107,0.15); color: #ff6b6b; border-color: rgba(255,107,107,0.3); }

.hbtn {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: #ddd; font-size: 12px; border-radius: 6px; padding: 7px 14px;
  cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
  font-weight: 500;
}
.hbtn:hover { background: rgba(255,255,255,0.2); color: #fff; }
.hbtn:disabled { opacity: 0.5; cursor: not-allowed; }
.hbtn-refresh {
  background: rgba(229,9,20,0.2); border-color: rgba(229,9,20,0.4); color: #ff8a8a;
}
.hbtn-refresh:hover { background: rgba(229,9,20,0.35); color: #fff; }
.hbtn.syncing svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.search-bar { padding: 16px 40px; }
.search-inner {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 10px 16px; max-width: 480px;
}
.search-inner input {
  background: none; border: none; outline: none; color: #fff; font-size: 13px;
  flex: 1; font-family: inherit;
}

.section { padding: 8px 40px 40px; }
.section-title {
  font-size: 22px; font-weight: 800; color: #fff;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
}
.section-count {
  font-size: 12px; background: rgba(255,255,255,0.1); padding: 3px 10px;
  border-radius: 12px; color: #aaa; font-weight: 600;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}

.card {
  position: relative;
  aspect-ratio: 2/3;
  border-radius: 8px;
  overflow: hidden;
  background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.card:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 24px rgba(229,9,20,0.3);
  z-index: 5;
}

.card-poster {
  width: 100%; height: 100%;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.card-poster img {
  width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity 0.3s;
}
.card-poster img.loaded { opacity: 1; }

.card-no-poster {
  font-size: 13px; padding: 16px; text-align: center; color: #ccc;
  font-weight: 700; line-height: 1.3;
  background: linear-gradient(135deg, #2a1a1a, #1a0a0a);
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}

.card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
  padding: 14px 12px 12px;
  opacity: 0; transition: opacity 0.2s;
  transform: translateY(8px);
}
.card:hover .card-overlay { opacity: 1; transform: translateY(0); }

.card-title {
  font-size: 13px; font-weight: 700; color: #fff;
  margin-bottom: 6px; line-height: 1.2;
}
.card-meta { font-size: 11px; color: #aaa; margin-bottom: 8px; }

.card-actions { display: flex; flex-wrap: wrap; gap: 4px; }
.cabtn {
  font-size: 10px; padding: 4px 8px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5);
  color: #fff; cursor: pointer; font-family: inherit; font-weight: 600;
  transition: all 0.15s;
}
.cabtn:hover { background: rgba(255,255,255,0.2); }
.cabtn-play { background: rgba(229,9,20,0.8); border-color: #e50914; }
.cabtn-play:hover { background: #e50914; }

.card-type {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,0.8); color: #fff;
  font-size: 10px; padding: 3px 7px; border-radius: 3px;
  z-index: 2; font-weight: 700;
}
.card-empty-badge {
  position: absolute; top: 8px; right: 8px;
  background: rgba(255,165,0,0.9); color: #000;
  font-size: 9px; padding: 3px 6px; border-radius: 3px;
  z-index: 2; font-weight: 700;
}

.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(20,20,20,0.95); color: #fff;
  padding: 14px 24px; border-radius: 8px;
  font-size: 13px; z-index: 1000;
  border: 1px solid rgba(255,255,255,0.15);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; }

.progress-wrap {
  position: fixed; top: 0; left: 0; right: 0;
  height: 3px; background: rgba(255,255,255,0.05);
  z-index: 200; opacity: 0; transition: opacity 0.3s;
}
.progress-wrap.show { opacity: 1; }
.progress-bar {
  height: 100%; background: linear-gradient(to right, #e50914, #ff6b6b);
  width: 0%; transition: width 0.4s;
}

.modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92); z-index: 500;
  overflow-y: auto; padding: 30px;
}
.modal.show { display: block; }
.modal-content {
  background: #1a1a1a; max-width: 1300px; margin: 0 auto;
  border-radius: 12px; padding: 24px;
  border: 1px solid rgba(255,255,255,0.1);
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.modal-title { font-size: 22px; font-weight: 800; color: #fff; }
.modal-close {
  background: #e50914; border: none; color: #fff;
  padding: 8px 16px; border-radius: 6px; cursor: pointer;
  font-weight: 600; font-size: 12px;
}

.ops-summary {
  background: rgba(76,175,80,0.1); padding: 14px 18px;
  border-radius: 8px; margin-bottom: 20px;
  border: 1px solid rgba(76,175,80,0.3);
  display: flex; gap: 24px; flex-wrap: wrap;
}
.ops-stat { display: flex; flex-direction: column; gap: 2px; }
.ops-stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.ops-stat-value { font-size: 18px; font-weight: 800; color: #4caf50; }

.ops-table {
  width: 100%; border-collapse: collapse; font-size: 12px; color: #ddd;
}
.ops-table th {
  background: #0a0a0a; padding: 12px 10px; text-align: left;
  border-bottom: 2px solid #e50914; font-weight: 700; color: #fff;
}
.ops-table td {
  padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
}
.ops-table tr:hover { background: rgba(255,255,255,0.03); }
.ops-table tr.row-empty { background: rgba(255,165,0,0.08); }
.ops-table tr.row-music { background: rgba(150,150,150,0.05); color: #888; }
.ops-row-status { font-weight: 700; text-align: center; }
.ops-status-yes { color: #4caf50; }
.ops-status-no { color: #ff6b6b; }

.empty-state { text-align: center; padding: 60px 20px; color: #555; font-size: 14px; }
</style>
</head>
<body>

<div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>

<div class="header">
  <div>
    <div class="header-title">ASAF'S LIBRARY</div>
    <div class="header-sub">C:\Users\asafa\FinishDownloads</div>
  </div>
  <div class="header-right">
    <div id="stats-display" class="stats-pill">📊 Loading...</div>
    <button class="hbtn" onclick="openOperationsCenter()">⚙️ Operations</button>
    <button class="hbtn hbtn-refresh" id="refreshBtn" onclick="refreshLibrary()">
      <svg width="13" height="13" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
        <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
      </svg>
      REFRESH
    </button>
  </div>
</div>

<div class="search-bar">
  <div class="search-inner">
    <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search movies & series…" oninput="filterCards(this.value)">
  </div>
</div>

<div class="section">
  <div class="section-title">📺 Series <span class="section-count" id="count-series">0</span></div>
  <div class="grid" id="grid-series"></div>
  <div class="empty-state" id="empty-series" style="display:none">No series yet</div>
</div>

<div class="section">
  <div class="section-title">🎬 Movies <span class="section-count" id="count-movies">0</span></div>
  <div class="grid" id="grid-movies"></div>
  <div class="empty-state" id="empty-movies" style="display:none">No movies yet</div>
</div>

<div class="modal" id="ops-modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">⚙️ Operations Center</div>
      <button class="modal-close" onclick="closeOpsModal()">✕ Close</button>
    </div>
    <div id="ops-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://localhost:8001';
const SERIES_KW = /\bS\d{2}\b|season\s*\d|complete|S01|S02/i;

function showToast(msg, ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), ms);
}
function setProgress(pct) {
  const wrap = document.getElementById('progress-wrap');
  wrap.classList.add('show');
  document.getElementById('progress-bar').style.width = pct + '%';
}
function clearProgress() {
  document.getElementById('progress-bar').style.width = '100%';
  setTimeout(() => {
    document.getElementById('progress-wrap').classList.remove('show');
    document.getElementById('progress-bar').style.width = '0%';
  }, 400);
}

function cleanTitle(name) {
  return name
    .replace(/www\.[^\s-]+\s*-?\s*/gi, '')
    .replace(/\.\d{4}\..*$/, '')
    .replace(/\[\d{4}p\].*$/i, '')
    .replace(/\b(WEBRip|BluRay|HDTV|x264|x265|REPACK|HEVC|DDP|Atmos|YTS\.\w+|GalaxyRG|GalaxyTV|TGx|PMZ|PMEDIA|LAMA|BYNDR|HIndi|TsS|GloDLS).*/gi, '')
    .replace(/[._\[\]\(\)]/g, ' ')
    .replace(/\b(1080p|720p|480p|2160p|HDR|DV)\b/gi, '')
    .replace(/\s+/g, ' ').trim();
}
function getYear(name) {
  const m = name.match(/\b(19|20)\d{2}\b/);
  return m ? m[0] : '';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function makeId(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h<<5)-h) + name.charCodeAt(i) | 0;
  return 'item-' + Math.abs(h);
}

function buildCard(item) {
  const title = cleanTitle(item.name);
  const year  = getYear(item.name);
  const itemPath = item.path || item.name;
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = makeId(item.name);
  card.dataset.path = itemPath;
  card.dataset.title = title;
  card.dataset.year = year;
  card.dataset.search = (title + ' ' + item.name).toLowerCase();

  const isEmpty = item.videoCount === 0;
  const typeBadge = item.isSeries ? '📺' : '🎬';

  card.innerHTML = `
    <div class="card-type">${typeBadge}</div>
    ${isEmpty ? '<div class="card-empty-badge">EMPTY</div>' : ''}
    <div class="card-poster">
      <div class="card-no-poster">${escapeHtml(title)}</div>
    </div>
    <div class="card-overlay">
      <div class="card-title">${escapeHtml(title)}</div>
      <div class="card-meta">${year || 'Unknown'} ${isEmpty ? '· No videos yet' : '· ' + item.videoCount + ' video' + (item.videoCount > 1 ? 's' : '')}</div>
      <div class="card-actions">
        ${!isEmpty ? '<button class="cabtn cabtn-play" onclick="event.stopPropagation();playCard(this)">▶ Play</button>' : ''}
        <button class="cabtn" onclick="event.stopPropagation();openFolder(this)">📁 Open</button>
        ${!isEmpty ? '<button class="cabtn" onclick="event.stopPropagation();openSubtitles(this)">🔤 Subs</button>' : ''}
      </div>
    </div>
  `;
  return card;
}

async function loadLibrary() {
  setProgress(20);
  try {
    const res = await fetch(API + '/api/operations-report');
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const report = await res.json();
    setProgress(60);

    const series = document.getElementById('grid-series');
    const movies = document.getElementById('grid-movies');
    series.innerHTML = '';
    movies.innerHTML = '';

    const visible = report.items.filter(i => !i.isMusic);
    let seriesCount = 0, moviesCount = 0;

    for (const item of visible) {
      const card = buildCard(item);
      if (item.isSeries) { series.appendChild(card); seriesCount++; }
      else               { movies.appendChild(card); moviesCount++; }
    }

    document.getElementById('count-series').textContent = seriesCount;
    document.getElementById('count-movies').textContent = moviesCount;
    document.getElementById('empty-series').style.display = seriesCount ? 'none' : 'block';
    document.getElementById('empty-movies').style.display = moviesCount ? 'none' : 'block';

    const pill = document.getElementById('stats-display');
    pill.textContent = `📊 ${seriesCount}S · ${moviesCount}M · ${report.totalVideos} files`;
    pill.classList.remove('warning');

    setProgress(80);
    loadPosters(visible);
    setProgress(100);
    clearProgress();
    return report;
  } catch(e) {
    clearProgress();
    document.getElementById('stats-display').textContent = '❌ Server offline';
    document.getElementById('stats-display').classList.add('warning');
    showToast('⚠ Server unreachable. Open ' + API + ' and accept the cert warning, then reload.');
    throw e;
  }
}

async function loadPosters(items) {
  for (const item of items) {
    if (item.videoCount === 0) continue;
    const title = cleanTitle(item.name);
    const year  = getYear(item.name);
    const cardId = makeId(item.name);
    try {
      const r = await fetch(API + '/api/poster?title=' + encodeURIComponent(title) + '&year=' + year);
      const d = await r.json();
      if (d.poster) injectPoster(cardId, d.poster, title);
    } catch(_) {}
  }
}

function injectPoster(cardId, posterUrl, title) {
  const card = document.querySelector(`[data-id="${cardId}"]`);
  if (!card) return;
  const poster = card.querySelector('.card-poster');
  if (poster.querySelector('img')) return;
  const noPost = poster.querySelector('.card-no-poster');
  const img = document.createElement('img');
  img.src = posterUrl;
  img.alt = title;
  img.onload  = () => { img.classList.add('loaded'); if (noPost) noPost.style.display = 'none'; };
  img.onerror = () => img.remove();
  poster.insertBefore(img, poster.firstChild);
}

async function refreshLibrary() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('syncing');
  btn.disabled = true;
  try {
    await loadLibrary();
    showToast('✓ Library refreshed');
  } catch(_) {}
  btn.classList.remove('syncing');
  btn.disabled = false;
}

async function playCard(btnEl) {
  const card = btnEl.closest('.card');
  const p = card.dataset.path;
  showToast('▶ Loading...');
  try {
    const epRes = await fetch(API + '/api/episodes?path=' + encodeURIComponent(p));
    const eps = await epRes.json();
    if (!Array.isArray(eps) || eps.length === 0) { showToast('⚠ No videos found'); return; }
    await fetch(API + '/api/play?path=' + encodeURIComponent(eps[0].path));
    showToast('▶ Playing ' + eps[0].name);
  } catch(e) { showToast('⚠ ' + e.message); }
}

function openFolder(btnEl) {
  const p = btnEl.closest('.card').dataset.path;
  fetch(API + '/api/play?path=' + encodeURIComponent(p)).catch(() => {});
  showToast('📁 Opening folder...');
}

async function openSubtitles(btnEl) {
  const card = btnEl.closest('.card');
  const title = card.dataset.title;
  const year  = card.dataset.year;
  showToast('🔤 Searching subtitles for ' + title);
  try {
    const r = await fetch(API + '/api/subtitles/search?title=' + encodeURIComponent(title) + '&year=' + year);
    const subs = await r.json();
    if (!subs.length) { showToast('No subtitles found'); return; }
    const best = subs[0];
    const dlRes = await fetch(API + '/api/subtitles/download?url=' + encodeURIComponent(best.url) +
      '&savePath=' + encodeURIComponent(card.dataset.path) + '&title=' + encodeURIComponent(title));
    const dlData = await dlRes.json();
    if (dlData.saved) showToast('✓ Subtitle saved');
    else showToast('⚠ Subtitle download failed');
  } catch(e) { showToast('⚠ ' + e.message); }
}

function filterCards(q) {
  const term = q.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c => {
    c.style.display = (!term || c.dataset.search.includes(term)) ? '' : 'none';
  });
}

async function openOperationsCenter() {
  const modal = document.getElementById('ops-modal');
  const content = document.getElementById('ops-content');
  content.innerHTML = '<div class="empty-state">Loading...</div>';
  modal.classList.add('show');

  try {
    const r = await fetch(API + '/api/operations-report');
    const data = await r.json();
    const visible = data.items.filter(i => !i.isMusic).length;
    const hidden = data.items.filter(i => i.isMusic).length;

    content.innerHTML = `
      <div class="ops-summary">
        <div class="ops-stat"><div class="ops-stat-label">Total Videos</div><div class="ops-stat-value">${data.totalVideos}</div></div>
        <div class="ops-stat"><div class="ops-stat-label">Total Folders</div><div class="ops-stat-value">${data.totalFolders}</div></div>
        <div class="ops-stat"><div class="ops-stat-label">Movies</div><div class="ops-stat-value">${data.movieFolders}</div></div>
        <div class="ops-stat"><div class="ops-stat-label">Series</div><div class="ops-stat-value">${data.seriesFolders}</div></div>
        <div class="ops-stat"><div class="ops-stat-label">Music (hidden)</div><div class="ops-stat-value" style="color:#888">${hidden}</div></div>
        <div class="ops-stat"><div class="ops-stat-label">Empty</div><div class="ops-stat-value" style="color:#ffa500">${data.emptyFolders}</div></div>
        <div class="ops-stat"><div class="ops-stat-label">Posters</div><div class="ops-stat-value">${data.postersFound}/${data.videoFolders}</div></div>
        <div class="ops-stat"><div class="ops-stat-label">Shown in UI</div><div class="ops-stat-value">${visible}</div></div>
      </div>

      <table class="ops-table">
        <thead><tr>
          <th>#</th><th>Folder</th><th>Videos</th><th>Type</th><th>Poster</th><th>Shown?</th><th>Reason</th>
        </tr></thead>
        <tbody>
          ${data.items.map((i, idx) => `
            <tr class="${i.isMusic ? 'row-music' : (i.videoCount === 0 ? 'row-empty' : '')}">
              <td>${idx + 1}</td>
              <td>${escapeHtml(i.name.length > 70 ? i.name.slice(0,70) + '…' : i.name)}</td>
              <td class="ops-row-status">${i.videoCount}</td>
              <td>${i.isMusic ? '🎵 Music' : i.isSeries ? '📺 Series' : '🎬 Movie'}</td>
              <td class="ops-row-status">${i.hasPoster ? '<span class="ops-status-yes">✓</span>' : '<span class="ops-status-no">✗</span>'}</td>
              <td class="ops-row-status">${!i.isMusic ? '<span class="ops-status-yes">YES</span>' : '<span class="ops-status-no">NO</span>'}</td>
              <td style="font-size:11px;color:#888">${i.isMusic ? 'Music folder (hidden)' : i.videoCount === 0 ? 'Empty folder (shown w/ badge)' : 'OK'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch(e) {
    content.innerHTML = '<div class="empty-state">⚠ Error: ' + escapeHtml(e.message) + '</div>';
  }
}

function closeOpsModal() {
  document.getElementById('ops-modal').classList.remove('show');
}

document.getElementById('ops-modal').addEventListener('click', e => {
  if (e.target.id === 'ops-modal') closeOpsModal();
});

loadLibrary();
</script>

</body>
</html>
